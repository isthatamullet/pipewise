name: CI (anthropic-quickstarts adapter)

on:
  push:
    branches: [main]
    paths:
      - 'examples/anthropic-quickstarts/**'
      - '.github/workflows/ci-anthropic-quickstarts.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/anthropic-quickstarts/**'
      - '.github/workflows/ci-anthropic-quickstarts.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: examples/anthropic-quickstarts

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy pipewise_anthropic_quickstarts/

      - name: Test (pytest)
        run: uv run pytest -ra
